name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write  # Required for PyPI Trusted Publishing OIDC

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Run Tests
        run: uv run pytest

      - name: Build Package
        run: uv build

      - name: Extract Changelog Section
        id: extract_changelog
        run: |
          python -c '
          import re
          from pathlib import Path

          changelog = Path("CHANGELOG.md").read_text(encoding="utf-8")
          tag = "${{ github.ref_name }}".lstrip("v")
          pattern = rf"##\s+\[{re.escape(tag)}\][\s\S]*?(?=\n##\s+\[|\Z)"
          match = re.search(pattern, changelog)
          if match:
              content = match.group(0).strip()
              content_lines = content.split("\n")[1:]
              body = "\n".join(content_lines).strip()
              with open(Path("${{ github.output }}"), "a", encoding="utf-8") as f:
                  f.write("body<<EOF\n")
                  f.write(body + "\n")
                  f.write("EOF\n")
          else:
              with open(Path("${{ github.output }}"), "a", encoding="utf-8") as f:
                  f.write("body=No changelog entry found for this version.\n")
          '

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body: ${{ steps.extract_changelog.outputs.body }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
